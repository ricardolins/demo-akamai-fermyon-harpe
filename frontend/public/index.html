<!DOCTYPE html>
<!-- Versão estática do HTML — usada pelo spin_static_fs.wasm (fileserver na Akamai).
     Diferente do frontend/index.html (usado pelo Vite), esta versão referencia
     /app.js em vez de /src/main.ts, pois o Vite já compilou tudo em app.js
     durante o "npm run build". -->

<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodEdge</title>
  <link rel="stylesheet" href="/style.css" />
  <!-- /style.css é servido pelo fileserver a partir de frontend/dist/style.css
       (copiado pelo Vite do diretório public/ durante o build) -->
</head>

<body>
  <header>
    <h1>FoodEdge</h1>
    <span id="edge-region"></span>
    <!-- Preenchido pelo JS com o valor do header X-Edge-Region da API.
         Mostra de qual PoP da Akamai veio a resposta (ex: "sa-east-1"). -->
  </header>

  <!-- Painel de métricas — visível durante a demo para mostrar latência -->
  <div id="metrics-panel">
    <span>Menu: <strong id="metric-menu">—</strong>ms</span>
    <!-- O "—" é substituído pelo JS após a chamada à API.
         Exemplo final: "208ms → Harper" ou "12ms ⚡ cache" -->
    <span>Personalização: <strong id="metric-personalization">—</strong>ms</span>
    <span>Geo: <strong id="metric-geo">—</strong>ms</span>
  </div>

  <main>
    <!-- Botões de filtro por culinária.
         data-cuisine é lido pelo JS com btn.dataset.cuisine.
         class="active" no primeiro aplica o estilo de selecionado via CSS. -->
    <div id="filters">
      <button data-cuisine="" class="active">Todos</button>
      <button data-cuisine="Hamburguers">Burgers</button>
      <button data-cuisine="Pizza">Pizza</button>
      <button data-cuisine="Japonesa">Japonesa</button>
      <button data-cuisine="Brasileira">Brasileira</button>
    </div>

    <!-- Container vazio — o JS injeta os cards de restaurantes aqui -->
    <div id="restaurants-grid"></div>
  </main>

  <!-- Script compilado pelo Vite (npm run build).
       type="module" habilita ES Modules — necessário para import/export funcionar no browser.
       Na versão de desenvolvimento, o Vite serve /src/main.ts diretamente.
       Na versão de produção (este arquivo), o bundle já está em /app.js. -->
  <script type="module" src="/app.js"></script>
</body>
</html>
